name: Build and deploy static pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours; tweak or remove
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for WIF (auth to Google) and Pages deployment OIDC
  pages: write     # required for Pages deployment

# Allow one concurrent deployment; cancel in-progress runs of older commits
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/728073987327/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: inventory-ssg-build-bot@inventory-496804.iam.gserviceaccount.com

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run generate
        env:
          SHEET_ID: ${{ vars.SHEET_ID }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
